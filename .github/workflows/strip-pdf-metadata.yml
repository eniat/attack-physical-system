name: strip pdf metadata
on: workflow_dispatch

permissions:
  contents: write
  pull-requests: write

jobs:
  strip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pypdf
      - run: |
          python - <<'PY'
          from pypdf import PdfReader, PdfWriter
          from pathlib import Path

          TITLE = "False data injection attacks and detection in a nuclear plant control system"

          for path in Path(".").rglob("*.pdf"):
              reader = PdfReader(path)
              writer = PdfWriter()
              for page in reader.pages:
                  writer.add_page(page)
              writer.add_metadata({"/Author": "Taine Morton", "/Title": TITLE})
              with open(path, "wb") as fh:
                  writer.write(fh)
              print("cleaned", path)
          PY
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "nothing to commit" && exit 0
          git checkout -b strip-pdf-metadata
          git commit -m "Strip stale author metadata from report PDFs"
          git push -u origin strip-pdf-metadata
          gh pr create --title "Strip stale author metadata from report PDFs" \
                       --body "Sets /Author and /Title on committed report PDFs." \
                       --base main
